<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Organic Chemistry Reactions</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #e8e0d0;
    --surface: #ddd5c4;
    --card: #f0ead8;
    --border: #c4baa8;
    --accent: #5c3e20;
    --accent2: #7a5538;
    --text: #1e1610;
    --muted: #6a5e50;
    --tag-bg: #ddd5c4;
    --note-bg: #f5e8cc;
    --note-border: #9a7040;
    --num-bg: #5c3e20;
    --shadow: rgba(80,60,30,0.13);
    --header-bg: #d8d0be;
  }
  .dark {
    --bg: #181818;
    --surface: #1f1f1f;
    --card: #242424;
    --border: #333333;
    --accent: #b8a080;
    --accent2: #a08868;
    --text: #e0d8cc;
    --muted: #807870;
    --tag-bg: #2a2a2a;
    --note-bg: #272420;
    --note-border: #8a7050;
    --num-bg: #6a5a48;
    --shadow: rgba(0,0,0,0.4);
    --header-bg: #1a1a1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Lora', Georgia, serif;
    font-size: 17px;
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  header {
    background: var(--header-bg);
    border-bottom: 2px solid var(--border);
    padding: 2.5rem 2rem 2rem;
    text-align: center;
    position: relative;
  }
  header h1 {
    font-size: clamp(1.5rem, 4vw, 2.4rem);
    font-weight: 700;
    letter-spacing: 0.01em;
    color: var(--accent);
    font-style: italic;
  }
  header h1 span { font-style: normal; color: var(--text); }
  header p { color: var(--muted); margin-top: 0.5rem; font-size: 0.88rem; letter-spacing: 0.04em; font-family: 'Source Serif 4', serif; }

  .theme-toggle {
    position: absolute; top: 1.2rem; right: 1.5rem;
    background: var(--card); border: 1px solid var(--border);
    color: var(--muted); border-radius: 20px;
    padding: 0.35rem 0.9rem; font-size: 0.8rem;
    cursor: pointer; font-family: 'Lora', serif;
    transition: all 0.2s;
  }
  .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

  .controls {
    display: flex; flex-wrap: wrap; gap: 0.75rem;
    padding: 1.1rem 2rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    align-items: center;
  }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap input {
    width: 100%; padding: 0.5rem 0.85rem 0.5rem 2.2rem;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 0.88rem;
    font-family: 'Lora', serif; outline: none; transition: border-color 0.2s;
  }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap svg { position: absolute; left: 0.65rem; top: 50%; transform: translateY(-50%); opacity: 0.4; }

  .filters { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .filter-btn {
    padding: 0.35rem 0.8rem; border-radius: 4px; border: 1px solid var(--border);
    background: var(--card); color: var(--muted); font-size: 0.78rem;
    cursor: pointer; transition: all 0.2s; font-family: 'Lora', serif;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent); color: var(--accent);
    background: var(--tag-bg);
  }
  .count { color: var(--muted); font-size: 0.82rem; margin-left: auto; white-space: nowrap; font-style: italic; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(100%, 540px), 1fr));
    gap: 1.1rem;
    padding: 1.5rem 2rem 3rem;
    max-width: 1300px;
    margin: 0 auto;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: box-shadow 0.2s, border-color 0.2s;
    box-shadow: 0 2px 8px var(--shadow);
  }
  .card:hover { border-color: var(--accent2); box-shadow: 0 4px 16px var(--shadow); }

  .card-header {
    padding: 0.9rem 1rem 0.7rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 0.7rem;
    background: var(--surface);
  }
  .card-num {
    min-width: 26px; height: 26px; border-radius: 4px;
    background: var(--num-bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.68rem; font-weight: 700; color: var(--bg);
    flex-shrink: 0; margin-top: 2px; font-family: 'Source Serif 4', serif;
  }
  .card-title { font-size: 1.05rem; font-weight: 700; line-height: 1.35; color: var(--text); }
  .card-subtitle { font-size: 0.83rem; color: var(--muted); margin-top: 0.2rem; font-style: italic; }

  .card-body { padding: 0.85rem 1rem 0.95rem; display: flex; flex-direction: column; gap: 0.6rem; }

  .rxn-arrow {
    display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
    background: var(--tag-bg); border-radius: 5px; padding: 0.45rem 0.7rem;
    font-size: 0.83rem; border: 1px solid var(--border);
  }
  .rxn-arrow .reactant { color: var(--accent); font-style: italic; font-weight: 600; }
  .rxn-arrow .arr { color: var(--muted); font-weight: 400; font-size: 1rem; }
  .rxn-arrow .product { color: var(--accent2); font-style: italic; font-weight: 600; }

  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.45rem; }
  .info-item { background: var(--tag-bg); border-radius: 5px; padding: 0.4rem 0.6rem; border: 1px solid var(--border); }
  .info-item .lbl { font-size: 0.63rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.2rem; font-family: 'Source Serif 4', serif; }
  .info-item .val { font-size: 0.81rem; line-height: 1.45; }
  .info-full { grid-column: 1 / -1; }

  .note-box {
    background: var(--note-bg);
    border-left: 3px solid var(--note-border);
    border-radius: 0 5px 5px 0;
    padding: 0.45rem 0.7rem;
    font-size: 0.79rem;
    color: var(--muted);
    font-style: italic;
    line-height: 1.5;
  }

  .section-divider {
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 1rem; padding: 0.4rem 0;
  }
  .section-divider span {
    font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--accent); white-space: nowrap;
    font-family: 'Source Serif 4', serif;
  }
  .section-divider hr { flex: 1; border: none; border-top: 1px solid var(--border); }

  .hidden { display: none !important; }

  @media (max-width: 600px) {
    .grid { padding: 1rem; gap: 0.9rem; }
    .controls { padding: 0.85rem 1rem; }
    .info-grid { grid-template-columns: 1fr; }
    header { padding: 2rem 1rem 1.5rem; }
    .theme-toggle { top: 0.8rem; right: 0.8rem; }
  }
</style>
</head>
<body>

<header>
  <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">☽ Dark</button>
  <h1><span>Organic Chemistry</span> Reactions</h1>
  <p>Reagents · Mechanisms · Selectivity · Reference</p>
</header>

<div class="controls">
  <div class="search-wrap">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Search reactions, reagents, mechanisms…"/>
  </div>
  <div class="filters" id="filters">
    <button class="filter-btn active" data-cat="all">All</button>
    <button class="filter-btn" data-cat="alkene">Alkene</button>
    <button class="filter-btn" data-cat="alkyne">Alkyne</button>
    <button class="filter-btn" data-cat="halide">Halides & SN</button>
    <button class="filter-btn" data-cat="carbonyl">Carbonyl</button>
    <button class="filter-btn" data-cat="aromatic">Aromatic</button>
    <button class="filter-btn" data-cat="amine">Amines</button>
  </div>
  <span class="count" id="countLabel"></span>
</div>

<div class="grid" id="grid"></div>

<script>
const reactions = [
  // ALKENE
  {num:1,cat:"alkene",name:"Addition of HX to Alkene",subtitle:"Electrophilic addition · Markovnikov",reactant:"Alkene",product:"Alkyl halide",reagent:"HX (HCl, HBr, HI)",regio:"Markovnikov",stereo:"Not stereoselective",mech:"Electrophilic Addition (AEₑ)",notes:"Proceeds via carbocation intermediate; carbocation rearrangements (hydride/methyl shifts) possible."},
  {num:2,cat:"alkene",name:"Addition of HBr (Peroxide Conditions)",subtitle:"Free radical addition · Anti-Markovnikov",reactant:"Alkene",product:"Alkyl bromide",reagent:"HBr + ROOR (peroxide) or hν",regio:"Anti-Markovnikov",stereo:"Not stereoselective",mech:"Free Radical Addition",notes:"Only works for HBr (not HCl or HI). No carbocation rearrangements. Bromine adds to the less substituted carbon."},
  {num:3,cat:"alkene",name:"Hydroboration–Oxidation",subtitle:"Anti-Markovnikov · Syn addition",reactant:"Alkene",product:"Alcohol",reagent:"① BH₃·THF  ② H₂O₂ / NaOH",regio:"Anti-Markovnikov",stereo:"Syn addition",mech:"Concerted 4-membered transition state (BH₃ adds across double bond in one step)",notes:"Overall: anti-Markovnikov, syn addition of H and OH. No rearrangements. Retention of configuration at carbon."},
  {num:4,cat:"alkene",name:"Oxymercuration–Demercuration",subtitle:"Markovnikov · No rearrangement",reactant:"Alkene",product:"Alcohol",reagent:"① Hg(OAc)₂ / H₂O  ② NaBH₄",regio:"Markovnikov",stereo:"Not stereoselective",mech:"Electrophilic Addition via non-classical mercurinium ion intermediate",notes:"No carbocation rearrangements (bridged mercurinium ion prevents it). OH adds to the more substituted carbon."},
  {num:5,cat:"alkene",name:"Catalytic Hydrogenation of Alkene",subtitle:"Syn addition · H₂ across double bond",reactant:"Alkene",product:"Alkane",reagent:"H₂ + Pt, Pd, or Ni catalyst",regio:"N/A",stereo:"Syn addition",mech:"Heterogeneous Catalytic Hydrogenation (both H atoms delivered from same face of catalyst surface)",notes:"Both hydrogens add from the same face of the double bond."},
  {num:6,cat:"alkene",name:"Addition of X₂ to Alkene",subtitle:"Anti addition · Halonium ion intermediate",reactant:"Alkene",product:"Vicinal dihalide",reagent:"X₂ (Cl₂ or Br₂) in CCl₄",regio:"N/A",stereo:"Anti addition",mech:"Electrophilic Addition via cyclic halonium (bromonium/chloronium) ion",notes:"Br₂/CCl₄ test: red-brown colour decolorises → confirms unsaturation. Anti addition gives trans product."},
  {num:7,cat:"alkene",name:"Halohydrin Formation (X₂/H₂O)",subtitle:"Anti addition · OH adds Markovnikov",reactant:"Alkene",product:"Halohydrin",reagent:"X₂ + H₂O",regio:"OH adds to more substituted carbon (Markovnikov)",stereo:"Anti addition",mech:"Electrophilic Addition via cyclic halonium ion; H₂O acts as nucleophile",notes:"Halogen adds to less substituted carbon, OH to more substituted carbon. Anti addition overall."},
  {num:8,cat:"alkene",name:"Syn-Dihydroxylation (Baeyer's Test)",subtitle:"Syn addition · cis-diol",reactant:"Alkene / Alkyne",product:"cis-Diol / α-diketone",reagent:"Cold, dilute KMnO₄ / alkaline",regio:"N/A",stereo:"Syn addition (both OH from same face)",mech:"Oxidation via cyclic manganate ester intermediate",notes:"Purple KMnO₄ decolorises → positive Baeyer's test. Alkynes give α-diketones. Use cold/dilute to avoid overoxidation."},
  {num:9,cat:"alkene",name:"Anti-Dihydroxylation",subtitle:"Epoxidation then SN2 ring opening",reactant:"Alkene",product:"trans-Diol",reagent:"① Peroxyacid (mCPBA, RCO₃H)  ② H₃O⁺ or NaOH/H₂O",regio:"N/A",stereo:"Anti addition overall",mech:"Step 1 — Epoxidation (concerted). Step 2 — SN2 ring opening by H₂O (backside attack → inversion at each carbon)",notes:"Two-step process: epoxide forms first, then acid or base-catalysed hydrolysis gives trans-diol."},
  {num:10,cat:"alkene",name:"Oxidative Ozonolysis",subtitle:"Cleaves double bond → carbonyl compounds",reactant:"Alkene",product:"Carboxylic acids (or ketones if R-substituted)",reagent:"O₃, then H₂O₂ / H₂O  (or hot KMnO₄)",regio:"N/A",stereo:"N/A",mech:"Cycloaddition of O₃ to form molozonide → rearranges to ozonide → oxidative workup",notes:"Oxidative workup (H₂O₂) → carboxylic acids. Reductive workup (Zn/H₂O or Me₂S) → aldehydes/ketones. Hot KMnO₄ also cleaves double bonds."},
  // ALKYNE
  {num:11,cat:"alkyne",name:"Lindlar Reduction — Alkyne → cis-Alkene",subtitle:"Lindlar catalyst · cis selectivity",reactant:"Alkyne",product:"cis-Alkene (Z)",reagent:"H₂ + Lindlar catalyst (Pd/CaCO₃, poisoned with Pb(OAc)₂ or quinoline)",regio:"N/A",stereo:"Syn addition → cis (Z) alkene",mech:"Heterogeneous Catalytic Hydrogenation (catalyst surface delivers both H from same side)",notes:"Lindlar catalyst is deactivated (poisoned) Pd — stops at alkene, does not reduce further."},
  {num:12,cat:"alkyne",name:"Birch Reduction — Alkyne → trans-Alkene",subtitle:"Dissolving metal · trans selectivity",reactant:"Internal alkyne R–C≡C–R′",product:"trans-Alkene (E)",reagent:"Na or Li in liquid NH₃, t-BuOH or EtOH as proton source",regio:"N/A",stereo:"Anti addition → trans (E) alkene",mech:"Radical anion mechanism: e⁻ from Na adds to alkyne → vinyl radical anion → protonation by alcohol → vinyl radical → second e⁻ → vinyl carbanion → protonation → trans alkene",notes:"NOT a hydrogenation. Two sequential single-electron transfers (SET). The bulky trans geometry is favoured because the vinyl radical/carbanion intermediate adopts the less hindered trans conformation before second protonation."},
  {num:"12b",cat:"alkyne",name:"Birch Reduction — Benzene → 1,4-Cyclohexadiene",subtitle:"Aromatic ring partial reduction",reactant:"Benzene",product:"1,4-Cyclohexadiene",reagent:"Na or Li in liquid NH₃, EtOH or t-BuOH as proton source",regio:"1,4-positions reduced (unconjugated diene product)",stereo:"N/A",mech:"e⁻ from Na adds to ring → radical anion → protonation by alcohol → cyclohexadienyl radical → second e⁻ → carbanion → protonation → 1,4-cyclohexadiene",notes:"Always gives the unconjugated 1,4-diene (not 1,3). Two electrons and two protons added overall. Alcohol (EtOH/t-BuOH) is essential as proton source — liquid NH₃ alone is not acidic enough."},
  {num:"12c",cat:"alkyne",name:"Birch Reduction — Substituted Benzenes (EDG vs EWG)",subtitle:"Regioselectivity depends on substituent type",reactant:"Substituted benzene (Ar–R)",product:"Substituted 1,4-cyclohexadiene",reagent:"Na or Li in liquid NH₃, EtOH or t-BuOH",regio:"EDG: double bonds remain on substituted carbons. EWG: double bonds avoid substituted carbon.",stereo:"N/A",mech:"Electron density distribution determines where first e⁻ adds: EWG pulls e⁻ density → ring carbons bearing EWG are reduced. EDG pushes e⁻ → unsubstituted positions are reduced first.",notes:"Memory trick — EDG: substituent stays ON the double bond. EWG: substituent ends up OFF the double bond (on saturated carbon). Example: anisole (–OMe, EDG) → OMe carbon stays sp². Benzoic acid (–COOH, EWG) → COOH carbon becomes sp³."},
  {num:13,cat:"alkyne",name:"NaNH₂ — Terminal Alkyne Deprotonation",subtitle:"sp C–H is acidic (pKₐ ≈ 25)",reactant:"Terminal alkyne R–C≡C–H",product:"Alkynyl anion R–C≡C⁻",reagent:"NaNH₂ (sodium amide) in liquid NH₃",regio:"N/A",stereo:"N/A",mech:"Acid-base reaction; NaNH₂ is strong enough base to deprotonate terminal alkyne (NH₃ pKₐ ≈ 38 > alkyne pKₐ ≈ 25)",notes:"Alkynyl anion is a useful nucleophile for SN2 alkylation. Only terminal alkynes react. Internal alkynes are not acidic enough."},
  {num:"13b",cat:"alkyne",name:"NaNH₂ — Double Elimination to form Alkyne",subtitle:"gem- or vic-dihalide → alkyne (2 × E2)",reactant:"gem-Dihalide (R–CX₂–R′) or vic-Dihalide (R–CHX–CHX–R′)",product:"Internal or terminal alkyne",reagent:"NaNH₂ (excess, ≥ 2 equiv.) in liquid NH₃, or NaNH₂ / heat",regio:"N/A",stereo:"N/A",mech:"Two sequential E2 eliminations: first gives vinyl halide (haloalkene), second gives alkyne. NaNH₂ is a strong enough base for both steps.",notes:"Example: CH₃–CCl₂–CH₃ → CH₃–C≡CH (propyne) with excess NaNH₂. Also works on vic-dihalides from halogenation of alkenes. Requires excess NaNH₂ (2 equivalents minimum)."},
  {num:"13c",cat:"alkyne",name:"NaNH₂ — Alkyne Isomerisation",subtitle:"Internal alkyne → terminal alkyne",reactant:"Internal alkyne (R–C≡C–R′)",product:"Terminal alkyne (R–C≡C–H)",reagent:"NaNH₂ in liquid NH₃",regio:"Triple bond migrates to terminal position",stereo:"N/A",mech:"Repeated deprotonation/reprotonation (proton transfers) shift the triple bond along the chain until the terminal alkyne accumulates (terminal anion is trapped by NH₄⁺)",notes:"Useful for converting internal alkynes to terminal alkynes for further functionalization. The terminal alkynyl anion is the thermodynamic sink under these conditions."},
  // HALIDES & SN
  {num:14,cat:"halide",name:"Allylic Bromination",subtitle:"NBS · Free radical mechanism",reactant:"Allylic C–H",product:"Allylic bromide",reagent:"N-Bromosuccinimide (NBS), hν or ROOR (initiator), CCl₄",regio:"Allylic position",stereo:"Racemisation (planar allylic radical)",mech:"Free Radical Substitution: initiation → allylic radical intermediate (resonance-stabilised) → NBS provides low [Br₂] → propagation",notes:"NBS maintains low concentration of Br₂, favouring allylic radical pathway over addition. Allylic radical is resonance-stabilised."},
  {num:15,cat:"halide",name:"Finkelstein Reaction",subtitle:"Halide exchange · SN2",reactant:"R–Cl (or R–Br)",product:"R–I",reagent:"NaI in dry acetone",regio:"N/A",stereo:"Inversion of configuration (Walden inversion)",mech:"SN2 (bimolecular nucleophilic substitution)",notes:"Driven to completion by insolubility of NaCl/NaBr in acetone (Le Chatelier's principle). Works best with primary and methyl halides."},
  {num:16,cat:"halide",name:"Swarts Reaction",subtitle:"Fluoride introduction · SN2",reactant:"R–Cl (or R–Br)",product:"R–F",reagent:"AgF (silver fluoride)",regio:"N/A",stereo:"Inversion of configuration",mech:"SN2",notes:"AgF is used because F⁻ alone is a poor SN2 nucleophile; Ag⁺ activates the C–X bond as a Lewis acid."},
  {num:17,cat:"halide",name:"Alcohol → Alkyl Halide via HX",subtitle:"ROH → RX",reactant:"R–OH",product:"R–X",reagent:"HX (HCl, HBr, HI) — reactivity: HI > HBr > HCl",regio:"N/A",stereo:"Racemisation (SN1, 2° and 3°); Inversion (SN2, 1°)",mech:"SN1 (2°, 3°) or SN2 (1°) after protonation of OH to form good leaving group (H₂O)",notes:"Order of reactivity: 3° > 2° > 1°. Rearrangements possible with SN1."},
  {num:18,cat:"halide",name:"Alcohol → Alkyl Bromide via PBr₃",subtitle:"ROH → RBr · Inversion",reactant:"R–OH",product:"R–Br",reagent:"PBr₃ or Red P + Br₂",regio:"N/A",stereo:"Inversion of configuration",mech:"SN2 — phosphorus activates OH as leaving group, then backside attack by Br⁻",notes:"Clean inversion. No rearrangements. Preferred over HBr for 1° and 2° alcohols."},
  {num:19,cat:"halide",name:"Alcohol → Alkyl Chloride via PCl₅",subtitle:"ROH → RCl · Inversion",reactant:"R–OH",product:"R–Cl",reagent:"PCl₅",regio:"N/A",stereo:"Inversion of configuration",mech:"SN2",notes:"Converts –OH to good leaving group (–OPCl₄), then Cl⁻ does backside attack."},
  {num:20,cat:"halide",name:"Alcohol → Alkyl Chloride via SOCl₂ (Darzens)",subtitle:"ROH → RCl · Retention (SNi)",reactant:"R–OH",product:"R–Cl",reagent:"SOCl₂ (thionyl chloride), no added base",regio:"N/A",stereo:"Retention of configuration (SNi)",mech:"SNi: chlorosulfite ester forms in situ; Cl⁻ attacks from the same face as the leaving group departs",notes:"Retention is unique to SOCl₂ without base. Adding pyridine changes to SN2 → inversion."},
  {num:21,cat:"halide",name:"Alcohol → Alkyl Chloride via SOCl₂ + Pyridine",subtitle:"ROH → RCl · Inversion",reactant:"R–OH",product:"R–Cl",reagent:"SOCl₂ + pyridine",regio:"N/A",stereo:"Inversion of configuration",mech:"SN2 — pyridine scavenges HCl, external Cl⁻ attacks from backside",notes:"Adding pyridine overrides SNi pathway → inversion instead of retention."},
  {num:22,cat:"halide",name:"Lucas Test",subtitle:"Distinguishing 1°, 2°, 3° alcohols",reactant:"R–OH",product:"R–Cl (turbidity)",reagent:"Conc. HCl + anhydrous ZnCl₂ (Lucas reagent)",regio:"N/A",stereo:"SN2 (1°) / SN1 (2° and 3°)",mech:"3° and allylic/benzylic: immediate SN1. 2°: SN1 within ~5 min. 1°: SN2, slow/no turbidity at room temperature.",notes:"Turbidity (cloudiness) = insoluble alkyl chloride has formed. 3° = immediate; 2° = within 5 min; 1° = no reaction (or very slow)."},

  {num:24,cat:"halide",name:"Cleavage of Ethers with HI",subtitle:"Ether → alcohol + alkyl iodide",reactant:"R–O–R′ + HI",product:"R–OH + R′–I",reagent:"Conc. HI",regio:"N/A",stereo:"Inversion (SN2) for 1° and 2°; Racemisation (SN1) for 3°",mech:"Protonation of ether oxygen, then SN1 or SN2 depending on substitution",notes:"I⁻ is the best nucleophile among halides for ether cleavage. For unsymmetrical ethers, I⁻ attacks the less sterically hindered carbon in SN2."},

const sections = [
  {key:"alkene",label:"Alkene Additions"},
  {key:"alkyne",label:"Alkyne Reactions"},
  {key:"halide",label:"Halides & Nucleophilic Substitution"},
  {key:"aromatic",label:"Aromatic Reactions"},
  {key:"carbonyl",label:"Carbonyl & Reduction"},
  {key:"amine",label:"Amines & Nitrogen"},
];

function buildCard(r) {
  return `<div class="card" data-cat="${r.cat}" data-search="${[r.name,r.reactant,r.product,r.reagent,r.mech,r.notes||''].join(' ').toLowerCase()}">
    <div class="card-header">
      <div class="card-num">${r.num}</div>
      <div>
        <div class="card-title">${r.name}</div>
        ${r.subtitle?`<div class="card-subtitle">${r.subtitle}</div>`:''}
      </div>
    </div>
    <div class="card-body">
      <div class="rxn-arrow">
        <span class="reactant">${r.reactant}</span>
        <span class="arr">→</span>
        <span class="product">${r.product}</span>
      </div>
      <div class="info-grid">
        <div class="info-item info-full"><div class="lbl">Reagent / Conditions</div><div class="val">${r.reagent}</div></div>
        <div class="info-item"><div class="lbl">Regioselectivity</div><div class="val">${r.regio}</div></div>
        <div class="info-item"><div class="lbl">Stereoselectivity</div><div class="val">${r.stereo}</div></div>
        <div class="info-item info-full"><div class="lbl">Mechanism</div><div class="val">${r.mech}</div></div>
      </div>
      ${r.notes?`<div class="note-box">${r.notes}</div>`:''}
    </div>
  </div>`;
}

const grid = document.getElementById('grid');

function renderAll() {
  grid.innerHTML = '';
  sections.forEach(s => {
    const div = document.createElement('div');
    div.className = 'section-divider';
    div.innerHTML = `<span>${s.label}</span><hr>`;
    grid.appendChild(div);
    reactions.filter(r => r.cat === s.key).forEach(r => {
      const el = document.createElement('div');
      el.innerHTML = buildCard(r);
      grid.appendChild(el.firstChild);
    });
  });
  updateCount();
}

function applyFilters() {
  const cat = document.querySelector('.filter-btn.active').dataset.cat;
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  document.querySelectorAll('.card').forEach(c => {
    const catOk = cat === 'all' || c.dataset.cat === cat;
    const qOk = !q || c.dataset.search.includes(q);
    c.classList.toggle('hidden', !(catOk && qOk));
  });
  document.querySelectorAll('.section-divider').forEach(d => d.classList.toggle('hidden', cat !== 'all'));
  updateCount();
}

function updateCount() {
  const visible = document.querySelectorAll('.card:not(.hidden)').length;
  document.getElementById('countLabel').textContent = `${visible} reaction${visible !== 1 ? 's' : ''}`;
}

renderAll();

document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('filters').addEventListener('click', e => {
  if (!e.target.matches('.filter-btn')) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  applyFilters();
});

let dark = false;
function toggleTheme() {
  dark = !dark;
  document.body.classList.toggle('dark', dark);
  document.getElementById('themeBtn').textContent = dark ? '☀ Light' : '☽ Dark';
}
</script>
