<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Organic Chemistry Reactions</title>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --card: #1a1e2a;
    --border: #2a2f3f;
    --accent: #4f8ef7;
    --accent2: #a78bfa;
    --accent3: #34d399;
    --accent4: #fb923c;
    --text: #e2e8f0;
    --muted: #8892a4;
    --tag-bg: #1e2535;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #0d0f14 0%, #1a1e2a 100%);
    border-bottom: 1px solid var(--border);
    padding: 2.5rem 2rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(79,142,247,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  header h1 { font-size: clamp(1.6rem, 4vw, 2.6rem); font-weight: 800; letter-spacing: -0.02em; }
  header h1 span { background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  header p { color: var(--muted); margin-top: 0.5rem; font-size: 0.95rem; }

  .controls {
    display: flex; flex-wrap: wrap; gap: 0.75rem;
    padding: 1.25rem 2rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    align-items: center;
  }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap input {
    width: 100%; padding: 0.55rem 0.85rem 0.55rem 2.4rem;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 0.9rem; outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap svg { position: absolute; left: 0.7rem; top: 50%; transform: translateY(-50%); opacity: 0.4; }
  .filters { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .filter-btn {
    padding: 0.4rem 0.85rem; border-radius: 20px; border: 1px solid var(--border);
    background: var(--card); color: var(--muted); font-size: 0.8rem; cursor: pointer; transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(79,142,247,0.1); }
  .count { color: var(--muted); font-size: 0.85rem; margin-left: auto; white-space: nowrap; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(100%, 560px), 1fr));
    gap: 1.25rem;
    padding: 1.5rem 2rem 3rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    display: flex; flex-direction: column;
  }
  .card:hover { transform: translateY(-2px); border-color: var(--accent); box-shadow: 0 4px 24px rgba(79,142,247,0.1); }

  .card-header {
    padding: 1rem 1.1rem 0.75rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 0.75rem;
  }
  .card-num {
    min-width: 28px; height: 28px; border-radius: 7px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 700; color: white; flex-shrink: 0; margin-top:1px;
  }
  .card-title { font-size: 0.98rem; font-weight: 700; line-height: 1.3; }
  .card-subtitle { font-size: 0.78rem; color: var(--muted); margin-top: 0.2rem; }

  .card-body { padding: 0.85rem 1.1rem 1rem; display: flex; flex-direction: column; gap: 0.6rem; flex: 1; }

  .rxn-arrow {
    display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
    background: var(--tag-bg); border-radius: 8px; padding: 0.5rem 0.75rem;
    font-size: 0.82rem;
  }
  .rxn-arrow .reactant { color: #93c5fd; font-style: italic; }
  .rxn-arrow .arr { color: var(--accent4); font-weight: 700; font-size: 1rem; }
  .rxn-arrow .product { color: #6ee7b7; font-style: italic; }

  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
  .info-item { background: var(--tag-bg); border-radius: 8px; padding: 0.45rem 0.65rem; }
  .info-item .lbl { font-size: 0.67rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.2rem; }
  .info-item .val { font-size: 0.82rem; font-weight: 500; }

  .info-full { grid-column: 1 / -1; }

  .tag-row { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.15rem; }
  .tag {
    font-size: 0.72rem; padding: 0.2rem 0.6rem; border-radius: 20px; font-weight: 600;
  }
  .tag-regios { background: rgba(167,139,250,0.15); color: #c4b5fd; border: 1px solid rgba(167,139,250,0.3); }
  .tag-stereos { background: rgba(52,211,153,0.12); color: #6ee7b7; border: 1px solid rgba(52,211,153,0.25); }
  .tag-mech { background: rgba(79,142,247,0.12); color: #93c5fd; border: 1px solid rgba(79,142,247,0.25); }
  .tag-note { background: rgba(251,146,60,0.12); color: #fdba74; border: 1px solid rgba(251,146,60,0.25); }

  .note-box { background: rgba(251,146,60,0.07); border-left: 3px solid var(--accent4); border-radius: 0 6px 6px 0; padding: 0.45rem 0.7rem; font-size: 0.8rem; color: #fdba74; }

  .section-divider {
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 1rem; padding: 0.5rem 0;
  }
  .section-divider span {
    font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent2); white-space: nowrap;
  }
  .section-divider hr { flex: 1; border: none; border-top: 1px solid var(--border); }

  .hidden { display: none !important; }

  @media (max-width: 600px) {
    .grid { padding: 1rem; gap: 1rem; }
    .controls { padding: 1rem; }
    .info-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

function buildCard(r, i) {
  const catColors = {alkene:"#4f8ef7",alkyne:"#a78bfa",halide:"#f472b6",aromatic:"#fb923c",carbonyl:"#34d399",amine:"#facc15",oxidation:"#f87171"};
  const col = catColors[r.cat] || "#8892a4";
  return `<div class="card" data-cat="${r.cat}" data-search="${[r.name,r.reactant,r.product,r.reagent,r.mech,r.notes||''].join(' ').toLowerCase()}">
    <div class="card-header">
      <div class="card-num" style="background:linear-gradient(135deg,${col},${col}99)">${r.num}</div>
      <div>
        <div class="card-title">${r.name}</div>
        ${r.subtitle ? `<div class="card-subtitle">${r.subtitle}</div>` : ''}
      </div>
    </div>
    <div class="card-body">
      <div class="rxn-arrow">
        <span class="reactant">${r.reactant}</span>
        <span class="arr">→</span>
        <span class="product">${r.product}</span>
      </div>
      <div class="info-grid">
        <div class="info-item info-full">
          <div class="lbl">Reagent / Conditions</div>
          <div class="val">${r.reagent}</div>
        </div>
        <div class="info-item">
          <div class="lbl">Regioselectivity</div>
          <div class="val">${r.regio}</div>
        </div>
        <div class="info-item">
          <div class="lbl">Stereoselectivity</div>
          <div class="val">${r.stereo}</div>
        </div>
        <div class="info-item info-full">
          <div class="lbl">Mechanism</div>
          <div class="val">${r.mech}</div>
        </div>
      </div>
      ${r.notes ? `<div class="note-box">💡 ${r.notes}</div>` : ''}
    </div>
  </div>`;
}

const grid = document.getElementById('grid');
const sections = [
  {key:"alkene", label:"Alkene Additions"},
  {key:"alkyne", label:"Alkyne Reactions"},
  {key:"halide", label:"Halides & Nucleophilic Substitution"},
  {key:"aromatic", label:"Aromatic Reactions"},
  {key:"carbonyl", label:"Carbonyl & Reduction"},
  {key:"amine", label:"Amines & Nitrogen"},
];

function render(cat='all', query='') {
  grid.innerHTML='';
  let count = 0;
  sections.forEach(s => {
    const filtered = reactions.filter(r => {
      const catOk = cat==='all' || r.cat===cat;
      const qOk = !query || r['data-search'] ? true : [r.name,r.reactant,r.product,r.reagent,r.mech,r.notes||''].join(' ').toLowerCase().includes(query);
      return catOk && qOk;
    });
    if (cat !== 'all' && filtered.length === 0) return;
    if (cat === 'all') {
      const sec = document.createElement('div');
      sec.className = 'section-divider';
      sec.innerHTML = `<span>${s.label}</span><hr>`;
      grid.appendChild(sec);
    }
    filtered.filter(r => r.cat === s.key).forEach(r => {
      const el = document.createElement('div');
      el.innerHTML = buildCard(r);
      const card = el.firstChild;
      // apply search filter
      if (query) {
        const haystack = [r.name,r.reactant,r.product,r.reagent,r.mech,r.notes||''].join(' ').toLowerCase();
        if (!haystack.includes(query)) { card.classList.add('hidden'); }
      }
      grid.appendChild(card);
      if (!card.classList.contains('hidden')) count++;
    });
  });
  document.getElementById('countLabel').textContent = `${count} reaction${count!==1?'s':''}`;
}

render();

document.getElementById('searchInput').addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  const activeCat = document.querySelector('.filter-btn.active')?.dataset.cat || 'all';
  applyFilters(activeCat, q);
});

document.getElementById('filters').addEventListener('click', e => {
  if (!e.target.matches('.filter-btn')) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  applyFilters(e.target.dataset.cat, q);
});

function applyFilters(cat, query) {
  let count = 0;
  document.querySelectorAll('.card').forEach(card => {
    const catOk = cat==='all' || card.dataset.cat===cat;
    const haystack = card.dataset.search || '';
    const qOk = !query || haystack.includes(query);
    if (catOk && qOk) { card.classList.remove('hidden'); count++; }
    else card.classList.add('hidden');
  });
  document.querySelectorAll('.section-divider').forEach(d => {
    if (cat !== 'all') d.classList.add('hidden');
    else d.classList.remove('hidden');
  });
  document.getElementById('countLabel').textContent = `${count} reaction${count!==1?'s':''}`;
}
</script>
